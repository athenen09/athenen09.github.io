<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - athenen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        nav {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { color: white; font-size: 1.5em; font-weight: bold; text-decoration: none; }
        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.3s;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }
        .nav-links a.active { background: rgba(255,255,255,0.3); }
        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
        }
        h1 { color: white; font-size: 2.5em; margin-bottom: 40px; }
        .post-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .post-card:hover { transform: translateY(-5px); }
        .post-date { color: #888; font-size: 0.9em; margin-bottom: 10px; }
        .post-title { color: #333; font-size: 1.5em; margin-bottom: 10px; }
        .post-excerpt { color: #666; line-height: 1.6; }
        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 40px;
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">athenen</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="blog.html" class="active">博客</a>
            <a href="about.html">关于</a>
        </div>
    </nav>
    
    <div class="container">
        <h1>博客文章</h1>
        <div class="post-card">
            <div class="post-date">2026年3月27日</div>
            <div class="post-title">博客上线了！</div>
            <div class="post-excerpt">欢迎来到我的个人博客。这里将记录我的学习心得、生活感悟和代码分享。</div>
        </div>
        <div class="post-card">
            <div class="post-date">2026年3月27日</div>
            <div class="post-title">建设中...</div>
            <div class="post-excerpt">更多内容即将上线，敬请期待！</div>
        </div>
    </div>
    
    <footer>
        <p>© 2026 athenen. All rights reserved.</p>
    </footer>
</body>
</html>
